<!DOCTYPE html>
<html>
<head>
  <title>Contact Us</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About Us</a>
  <a href="contact.html">Contact Us</a>

  <input type="text" id="searchInput">
  <button onclick="search()">Search</button>
  <button onclick="clearResults()">Clear</button>
</nav>


<section class="contact-section">
  <h1>Contact Us</h1>
  <form id="contactForm">
    <input type="text" id="name" placeholder="Your Name" required><br><br>
    <input type="email" id="email" placeholder="Your Email" required><br><br>
    <textarea id="message" placeholder="Your Message" required></textarea><br><br>
    <button type="submit">Send</button>
  </form>
  <div id="confirmationMessage" style="display:none; color:green; font-weight:bold; margin-top:20px;">Thank you for contacting us! We'll get back to you soon.</div>
</section>

<script>
document.getElementById('contactForm').onsubmit = function(e) {
  e.preventDefault();
  document.getElementById('confirmationMessage').style.display = 'block';
  document.getElementById('contactForm').reset();
};
</script>

<script src="script.js"></script>
</body>
</html>
